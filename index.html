<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Todo App</title>

	<meta name="description" content="Pure typescript todo app">
	<meta name="author" content="LayoutIt!">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'system-ui', 'Avenir', 'Helvetica', 'Arial', 'sans-serif'],
					},
				},
			},
		}
	</script>
</head>

<body class="font-sans">
	<div class="min-h-screen flex items-center justify-center px-4 py-8 bg-gradient-to-br from-gray-100 to-gray-200">
		<div class="w-full max-w-md">
			<!-- Header -->
			<div class="mb-8">
				<h1 class="text-3xl font-bold text-gray-900 mb-2">Todo App</h1>
				<p class="text-gray-600">Organize your tasks efficiently</p>
			</div>

			<!-- Form Card -->
			<div class="bg-gray-50 rounded-lg shadow-md p-6 mb-6 border border-gray-300">
				<form role="form" id="mainForm" novalidate>
					<div class="mb-4">
						<label for="todoText" class="block text-sm font-medium text-gray-700 mb-2">
							Add a new task
						</label>
						<input 
							type="text" 
							class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
							id="todoText" 
							autocomplete="off" 
							required 
							pattern=".*\S.*"
							placeholder="Enter your task...">
						<div class="text-sm text-red-600 hidden mt-1">
							Please enter a task
						</div>
					</div>
					<button 
						type="submit" 
						class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 disabled:bg-gray-400 disabled:cursor-not-allowed" 
						id="addBtn" 
						disabled>
						Add Task
					</button>
				</form>
			</div>

			<!-- Tasks List -->
			<div class="bg-gray-50 rounded-lg shadow-md p-6 border border-gray-300">
				<h2 class="text-lg font-semibold text-gray-900 mb-4">Your Tasks</h2>
				<div id='table' class="space-y-0">
					<!-- Tasks will be rendered here -->
				</div>
			</div>
		</div>
	</div>

	<script src="src/index.ts"></script>
</body>

</html>
